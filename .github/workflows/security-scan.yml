name: Security Scan

on:
  push:
    branches:
      - master
      - 'cadenzaflow-*.*.*'
  workflow_dispatch:

env:
  APP_NAME: cadenzaflow-bpm-platform
  MAIL_TO: ali.aras@pia-team.com,rahmani.saygin@pia-team.com
  SMTP_SERVER: mail-eu.smtp2go.com
  SMTP_PORT: "2525"

jobs:
  security-scan:
    runs-on: cadenzaflow-runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve APP_VERSION from root pom.xml
        id: ver
        run: |
          VERSION=$(python3 - <<'PY'
          import xml.etree.ElementTree as ET
          ns = {'m': 'http://maven.apache.org/POM/4.0.0'}
          root = ET.parse('pom.xml').getroot()
          v = root.find('m:version', ns)
          print(v.text if v is not None else '')
          PY
          )
          if [ -z "$VERSION" ]; then
            echo "::error::Unable to read project version from pom.xml" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected APP_VERSION: $VERSION"

      - name: Trivy filesystem scan
        id: trivy_fs
        uses: ./.github/actions/trivy-scan
        with:
          scan_type: fs
          scan_target: .
          severity: HIGH,CRITICAL
          output_file: trivy-fs-report.json
          skip_dirs: .git,node_modules,target,.mvn,docs,test,src/test

      - name: Generate security report and send mail
        if: always()
        uses: ./.github/actions/security-report
        with:
          app_name: ${{ env.APP_NAME }}
          version: ${{ steps.ver.outputs.version }}
          environment: production
          trivy_repo_report: ''
          trivy_fs_report: ${{ steps.trivy_fs.outputs.report_path }}
          trivy_image_report: ''
          sonarqube_report: ''
          mail_to: ${{ env.MAIL_TO }}
          smtp_server: ${{ env.SMTP_SERVER }}
          smtp_port: ${{ env.SMTP_PORT }}
          smtp_username: ${{ secrets.SMTP_USERNAME }}
          smtp_password: ${{ secrets.SMTP_PASSWORD }}
